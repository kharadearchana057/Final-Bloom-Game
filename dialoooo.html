<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Final Bloom - Dialogue Scene Enhanced</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Cinzel', serif; 
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.5)), 
                              url('https://www.creativefabrica.com/wp-content/uploads/2023/03/29/Forest-background-Forest-Landscape-Graphics-65678898-1.jpg'); 
            background-size: cover;
            background-position: center;
        }

        .character {
            position: absolute;
            bottom: 0;
            height: 75%; 
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.8));
        }

        .girl-character { left: 10%; z-index: 10; }
        .boy-character { right: 10%; z-index: 10; }

        .dialogue-box {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 60px 60px 60px 60px / 80px 80px 40px 40px; 
            padding: 25px 35px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            max-width: 450px;
            text-align: left;
            font-size: 1.25em;
            color: #1a202c; 
            opacity: 0; 
            transition: opacity 1.2s ease-out, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1.1); 
            transform: translateY(40px) scale(0.8);
            z-index: 20;
            border: 3px solid #6ee7b7; 
            filter: drop-shadow(0 0 5px rgba(110, 231, 183, 0.5));
        }

        .dialogue-box.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .dialogue-box::after {
            content: '';
            position: absolute;
            border: 18px solid transparent;
            border-bottom-color: rgba(255, 255, 255, 0.98);
            bottom: -30px;
            z-index: 1;
        }

        .girl-dialogue { top: 15%; left: 15%; }
        .girl-dialogue::after { left: 30%; transform: rotate(180deg); }

        .boy-dialogue { top: 15%; right: 15%; }
        .boy-dialogue::after { right: 30%; transform: rotate(180deg); }

        #nextButton, #skipButton {
            position: absolute;
            padding: 12px 30px;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 9999px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            z-index: 30;
        }

        #nextButton {
            bottom: 50px;
            right: 50%;
            transform: translateX(50%);
            background-color: #f59e0b;
            display: none;
        }
        #nextButton:hover {
            background-color: #d97706;
            transform: translateX(50%) scale(1.08);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        #skipButton {
            bottom: 50px;
            left: 50px;
            background-color: #10b981; /* Emerald green */
        }
        #skipButton:hover {
            background-color: #059669;
            transform: scale(1.08);
        }
    </style>
</head>
<body>

    <img src="Girl-F.png" alt="Anya - The Guardian" class="character girl-character">
    <img src="Boy-F.png" alt="Kael - The Apprentice" class="character boy-character">

    <div id="anyaDialogue" class="dialogue-box girl-dialogue"></div>
    <div id="kaelDialogue" class="dialogue-box boy-dialogue"></div>
    
    <button id="nextButton">Begin Chapter 1</button>
    <button id="skipButton">Skip →</button>

    <script>
        const dialogues = [
            { speaker: "Anya", element: "anyaDialogue", text: "Welcome to the game. Your path to 'The Final Bloom' begins from here. We must attune your senses to the world's hidden beauty." },
            { speaker: "Kael", element: "kaelDialogue", text: "The first petal is guarded by the Wild Heart Spirit. Find the rare, patterned butterflies to prove your observational focus. 'Butterfly Spotter Game' (Level 1) Spot the butterfly." },
            { speaker: "Anya", element: "anyaDialogue", text: "A hidden grove is then revealed. But the Spirit's path is fractured. You must restore the ancient map to find the way forward. 'Puzzle Game' (Level 2) Arrange the puzzle." },
            { speaker: "Kael", element: "kaelDialogue", text: "The forest's memory is essential to its health. Match the forgotten fauna and flora to unlock the gate. Forest Memory card Game (Level 3). Find the matching card." },
            { speaker: "Anya", element: "anyaDialogue", text: "The forest connects to the sea, and a sickness pollutes the waters, weakening the petal. Heal the connection by purifying the source. 'Ocean Cleanup' (Level 4), Click on trash items to collect them." },
            { speaker: "Kael", element: "kaelDialogue", text: "The final challenge is to master the winds. Guide the forest's messenger bird safely through the chaotic, broken canopy to claim the first petal. 'Flappy Clouds' (Level 5), Tap to make the bird fly." },
            { speaker: "Anya", element: "anyaDialogue", text: "You have claimed the Petal of Nature! Let the whispers guide you. Press 'Start' when you're ready for the realm.", isFinal: true }
        ];

        let currentDialogueIndex = -1;
        const dialogueBoxes = {
            anyaDialogue: document.getElementById('anyaDialogue'),
            kaelDialogue: document.getElementById('kaelDialogue')
        };
        const nextButton = document.getElementById('nextButton');
        const skipButton = document.getElementById('skipButton');
        let isTyping = false;

        function typeText(element, text, callback) {
            let i = 0;
            element.textContent = '';
            isTyping = true;
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                    isTyping = false;
                    if (callback) callback();
                }
            }, 30); 
        }

        function advanceDialogue() {
    if (isTyping) {
        const currentDialogue = dialogues[currentDialogueIndex];
        if (currentDialogue) {
            dialogueBoxes[currentDialogue.element].textContent = currentDialogue.text;
            isTyping = false;
        }
        return;
    }

    if (currentDialogueIndex === dialogues.length - 1) {
        nextButton.textContent = "Loading...";
        nextButton.disabled = true;

        // Redirect after a short delay
        setTimeout(() => {
            // Use relative path from your index.html to level1.html
            window.location.href = "chapter1/level1.html?" + new Date().getTime();
            // Adding ?timestamp ensures browser loads latest version, bypassing cache
        }, 1500); // 1.5 seconds delay

        return; 
    }

    const previousDialogue = dialogues[currentDialogueIndex];
    currentDialogueIndex++;
    const currentDialogue = dialogues[currentDialogueIndex];
    if (!currentDialogue) return; 

    const currentBox = dialogueBoxes[currentDialogue.element];
    const otherBox = currentDialogue.element === 'anyaDialogue' ? dialogueBoxes['kaelDialogue'] : dialogueBoxes['anyaDialogue'];

    if (previousDialogue) otherBox.classList.remove('show');

    setTimeout(() => {
        currentBox.classList.add('show');
        typeText(currentBox, currentDialogue.text, () => {
            nextButton.textContent = currentDialogue.isFinal ? "Start Game!" : "Continue →";
        });
    }, 800);
}

        // Skip button → jump straight to last dialogue
        skipButton.addEventListener('click', () => {
            // Clear any active dialogue animations
            Object.values(dialogueBoxes).forEach(box => box.classList.remove('show'));

            const lastDialogue = dialogues[dialogues.length - 1];
            const box = dialogueBoxes[lastDialogue.element];
            
            box.classList.add('show');
            box.textContent = lastDialogue.text;
            nextButton.textContent = "Start Game!";
            nextButton.style.display = 'block';
            currentDialogueIndex = dialogues.length - 1;
        });

        nextButton.addEventListener('click', advanceDialogue);

        window.onload = () => {
            nextButton.style.display = 'block'; 
            advanceDialogue();
        };
    </script>
</body>
</html>
