<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Final Bloom - Landing Page</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />

  <style>
    /* Fullscreen swiper background */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }
    .swiper {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .swiper-slide {
      background-size: cover;
      background-position: center;
    }
    /* Overlay for dark effect */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }
    /* Centered content */
    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      color: #fff;
    }
    .content h1 {
      font-size: 3rem;
      font-weight: 700;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      animation: fadeInDown 1.5s ease-out;
    }
    .content p {
      font-size: 1.2rem;
      max-width: 750px;
      margin-top: 20px;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.8);
      animation: fadeInUp 2s ease-out;
    }
    .content .btn-custom {
      margin-top: 30px;
      padding: 12px 35px;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      border: none;
      border-radius: 50px;
      color: white;
      transition: 0.3s ease;
      animation: fadeInUp 2.5s ease-out;
    }
    .content .btn-custom:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 75, 43, 0.7);
    }
    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Responsive */
    @media (max-width: 768px) {
      .content h1 { font-size: 2rem; }
      .content p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Swiper background -->
  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide" style="background-image:url('https://i.pinimg.com/736x/f6/2b/df/f62bdf7529e46caf782c8bf4c074e663.jpg')"></div>
      <div class="swiper-slide" style="background-image:url('https://i.pinimg.com/1200x/1e/9c/30/1e9c3018249738243996b4aae4d69e49.jpg')"></div>
      <div class="swiper-slide" style="background-image:url('https://i.pinimg.com/1200x/7c/85/e0/7c85e07e7d6ee504d7eb2df4c397b2d6.jpg')"></div>
      <div class="swiper-slide" style="background-image:url('https://i.pinimg.com/1200x/b0/b5/32/b0b5328850ec9e8fd240289f1a9bc0e1.jpg')"></div>
      <div class="swiper-slide" style="background-image:url('https://i.pinimg.com/1200x/67/6d/ce/676dce6019b304c48fc7864dff1424cd.jpg')"></div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Content -->
 <div class="content">
    <h1>Enter the World of <br><span class="final-bloom-span">The Final Bloom</span></h1>
    <p>Embark on an epic journey through mystical realms where nature's final awakening holds the key to saving both digital and organic worlds. Experience cutting-edge gameplay in a universe where every choice blooms into destiny.</p>

    <button class="btn btn-custom" onclick="window.location.href='signinup.html'">
        Start Your Journey
    </button>
    <!-- <button class="btn btn-custom" onclick="window.location.href='\thefinalbloom\signinup.html'">
    Start Your Journey
</button> -->
<!-- <div class="content">
    <a href="signinup.html" style="text-decoration: none;">
        <button class="btn btn-custom">
            Start Your Journey
        </button>
    </a>
</div> -->
</div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
  <script>
    var swiper = new Swiper(".mySwiper", {
      loop: true,
      autoplay: {
        delay: 1500,
        disableOnInteraction: false,
      },
      effect: "fade",
      speed: 1500
    });
  </script>
</body>
</html>
